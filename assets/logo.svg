<svg width="800" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <title>LOGIMEX GLOBAL – Official Logo (Dark)</title>
  <desc>Professional logo for LOGIMEX GLOBAL freight forwarding. Compass rose symbol in deep navy with prestige gold.</desc>

  <!-- Card background -->
  <rect x="0" y="0" width="680" height="420" rx="20" fill="#0A1628"/>

  <!-- Subtle grid texture -->
  <line x1="0" y1="140" x2="680" y2="140" stroke="#FFFFFF" stroke-width="0.3" opacity="0.04"/>
  <line x1="0" y1="280" x2="680" y2="280" stroke="#FFFFFF" stroke-width="0.3" opacity="0.04"/>
  <line x1="227" y1="0" x2="227" y2="420" stroke="#FFFFFF" stroke-width="0.3" opacity="0.04"/>
  <line x1="454" y1="0" x2="454" y2="420" stroke="#FFFFFF" stroke-width="0.3" opacity="0.04"/>

  <!-- Gold top accent bar -->
  <rect x="0" y="0" width="680" height="4" fill="#D4A017"/>

  <!-- Outer ambient rings -->
  <circle cx="148" cy="210" r="108" fill="none" stroke="#D4A017" stroke-width="0.6" opacity="0.15"/>
  <circle cx="148" cy="210" r="92" fill="none" stroke="#D4A017" stroke-width="0.6" opacity="0.12"/>

  <!-- Main compass disc -->
  <circle cx="148" cy="210" r="80" fill="#071222"/>
  <circle cx="148" cy="210" r="80" fill="none" stroke="#D4A017" stroke-width="2.5"/>

  <!-- Inner dashed bearing ring -->
  <circle cx="148" cy="210" r="62" fill="none" stroke="#1E3A6A" stroke-width="1" stroke-dasharray="5 5"/>

  <!-- Tick marks -->
  <line x1="148" y1="131" x2="148" y2="142" stroke="#D4A017" stroke-width="1.5" opacity="0.8"/>
  <line x1="148" y1="278" x2="148" y2="289" stroke="#D4A017" stroke-width="1" opacity="0.4"/>
  <line x1="69" y1="210" x2="80" y2="210" stroke="#D4A017" stroke-width="1" opacity="0.4"/>
  <line x1="216" y1="210" x2="227" y2="210" stroke="#D4A017" stroke-width="1" opacity="0.4"/>
  <line x1="92" y1="154" x2="100" y2="162" stroke="#D4A017" stroke-width="1" opacity="0.3"/>
  <line x1="196" y1="154" x2="188" y2="162" stroke="#D4A017" stroke-width="1" opacity="0.3"/>
  <line x1="92" y1="266" x2="100" y2="258" stroke="#D4A017" stroke-width="1" opacity="0.3"/>
  <line x1="196" y1="266" x2="188" y2="258" stroke="#D4A017" stroke-width="1" opacity="0.3"/>

  <!-- Spokes -->
  <line x1="148" y1="210" x2="204" y2="154" stroke="#D4A017" stroke-width="0.8" opacity="0.25"/>
  <line x1="148" y1="210" x2="92" y2="154" stroke="#D4A017" stroke-width="0.8" opacity="0.25"/>
  <line x1="148" y1="210" x2="204" y2="266" stroke="#D4A017" stroke-width="0.8" opacity="0.25"/>
  <line x1="148" y1="210" x2="92" y2="266" stroke="#D4A017" stroke-width="0.8" opacity="0.25"/>
  <line x1="148" y1="210" x2="148" y2="134" stroke="#D4A017" stroke-width="0.8" opacity="0.2"/>
  <line x1="148" y1="210" x2="148" y2="286" stroke="#D4A017" stroke-width="0.8" opacity="0.2"/>
  <line x1="148" y1="210" x2="74" y2="210" stroke="#D4A017" stroke-width="0.8" opacity="0.2"/>
  <line x1="148" y1="210" x2="222" y2="210" stroke="#D4A017" stroke-width="0.8" opacity="0.2"/>

  <!-- North point -->
  <polygon points="148,135 156,194 148,204 140,194" fill="#D4A017"/>
  <!-- South point -->
  <polygon points="148,285 154,226 148,216 142,226" fill="#FFFFFF" opacity="0.25"/>
  <!-- East point -->
  <polygon points="222,210 163,216 153,210 163,204" fill="#FFFFFF" opacity="0.25"/>
  <!-- West point -->
  <polygon points="74,210 133,216 143,210 133,204" fill="#FFFFFF" opacity="0.25"/>

  <!-- Diagonal minor points -->
  <polygon points="204,154 166,196 160,190 196,148" fill="#D4A017" opacity="0.4"/>
  <polygon points="92,154 130,196 136,190 100,148" fill="#D4A017" opacity="0.4"/>
  <polygon points="204,266 166,224 160,230 196,272" fill="#D4A017" opacity="0.4"/>
  <polygon points="92,266 130,224 136,230 100,272" fill="#D4A017" opacity="0.4"/>

  <!-- Centre jewel -->
  <circle cx="148" cy="210" r="10" fill="#D4A017"/>
  <circle cx="148" cy="210" r="6" fill="#0A1628"/>
  <circle cx="148" cy="210" r="3" fill="#D4A017"/>

  <!-- N label -->
  <text x="143" y="128" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#D4A017" letter-spacing="1">N</text>

  <!-- LOGIMEX wordmark -->
  <text x="265" y="188" font-family="Arial Black,Helvetica Neue,Arial,sans-serif" font-size="58" font-weight="900" letter-spacing="3" fill="#FFFFFF">LOGIMEX</text>
  <rect x="265" y="198" width="372" height="4" rx="2" fill="#D4A017"/>
  <text x="268" y="234" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700" letter-spacing="18" fill="#D4A017">GLOBAL</text>
  <rect x="265" y="250" width="372" height="1" rx="0.5" fill="#FFFFFF" opacity="0.08"/>
  <text x="267" y="272" font-family="Arial,Helvetica,sans-serif" font-size="11.5" font-weight="400" letter-spacing="5" fill="#4E6E96">FREIGHT FORWARDING SOLUTIONS</text>

  <!-- Route nodes -->
  <circle cx="265" cy="306" r="4" fill="#D4A017"/>
  <rect x="274" y="304" width="30" height="1.5" rx="0.75" fill="#D4A017" opacity="0.45"/>
  <circle cx="309" cy="306" r="3" fill="#D4A017" opacity="0.5"/>
  <rect x="317" y="304" width="20" height="1.5" rx="0.75" fill="#D4A017" opacity="0.25"/>
  <circle cx="342" cy="306" r="2" fill="#D4A017" opacity="0.25"/>

  <!-- Gold bottom accent bar -->
  <rect x="0" y="416" width="680" height="4" fill="#D4A017"/>
</svg>
